<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tornknäckarna · Scouting</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1117;--surface:#1a1d27;--ink:#e8eaf0;--ink-2:#c0c4d0;--ink-3:#7a7f94;--ink-4:#4a4f62;
    --line:#272b3a;--line-2:#1e2130;--accent:#4d9eff;
    --win:#34c47a;--win-bg:#0d2b1e;--loss:#f06050;--loss-bg:#2a1210;
    --upcoming:#a78bfa;--upcoming-bg:#1e1740;
    --ban-high:#f87171;--ban-med:#fb923c;
    --section-bans-bg:#1c1914;--section-bans-bdr:#2e2516;
    --section-roster-bg:#141622;--section-roster-bdr:#1e2540;
    --section-hist-bg:#131d18;--section-hist-bdr:#1a3023;
    --active-item-bg:#1a2040;
    --shadow-h:0 2px 8px rgba(0,0,0,.3),0 8px 32px rgba(0,0,0,.4);
    --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--radius:12px;--radius-sm:6px;--tr:0.18s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg:#0f1117;--surface:#1a1d27;--ink:#e8eaf0;--ink-2:#c0c4d0;--ink-3:#7a7f94;--ink-4:#4a4f62;
    --line:#272b3a;--line-2:#1e2130;--accent:#4d9eff;
    --win:#34c47a;--win-bg:#0d2b1e;--loss:#f06050;--loss-bg:#2a1210;
    --upcoming:#a78bfa;--upcoming-bg:#1e1740;--ban-high:#f87171;--ban-med:#fb923c;
    --section-bans-bg:#1c1914;--section-bans-bdr:#2e2516;
    --section-roster-bg:#141622;--section-roster-bdr:#1e2540;
    --section-hist-bg:#131d18;--section-hist-bdr:#1a3023;
    --active-item-bg:#1a2040;--shadow-h:0 2px 8px rgba(0,0,0,.3),0 8px 32px rgba(0,0,0,.4);
  }
  [data-theme="console"] {
    --bg:#020a02;--surface:rgba(0,20,0,0.85);--ink:#00ff41;--ink-2:#00dd38;--ink-3:#00aa2a;--ink-4:#006614;
    --line:#004a10;--line-2:#003308;--accent:#00ff41;
    --win:#00ff41;--win-bg:#003308;--loss:#ff2020;--loss-bg:#1e0000;
    --upcoming:#ffb000;--upcoming-bg:#1a0f00;--ban-high:#ff2020;--ban-med:#ffb000;
    --section-bans-bg:#040f04;--section-bans-bdr:#004a10;
    --section-roster-bg:#020d02;--section-roster-bdr:#004a10;
    --section-hist-bg:#020a02;--section-hist-bdr:#004a10;
    --active-item-bg:#001a00;--shadow-h:0 0 15px rgba(0,255,65,0.15),0 0 40px rgba(0,255,65,0.05);
  }
  [data-theme="light"] {
    --bg:#fafafa;--surface:#ffffff;--ink:#0a0a0a;--ink-2:#3a3a3a;--ink-3:#777777;--ink-4:#aaaaaa;
    --line:#e8e8e8;--line-2:#f0f0f0;--accent:#0066cc;
    --win:#1a7a4a;--win-bg:#edf7f2;--loss:#b33a2a;--loss-bg:#fdf0ee;
    --upcoming:#5a3fa0;--upcoming-bg:#f2effe;--ban-high:#9b1c1c;--ban-med:#92400e;
    --section-bans-bg:#fdf8f3;--section-bans-bdr:#f0e0cc;
    --section-roster-bg:#f5f8ff;--section-roster-bdr:#dce6f8;
    --section-hist-bg:#f6faf7;--section-hist-bdr:#cce8d4;
    --active-item-bg:#edf2ff;--shadow-h:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.08);
  }

  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; transition: background var(--tr), color var(--tr); }
  [data-theme="console"] body { font-family:'Share Tech Mono',monospace; font-size:13px; cursor:crosshair; }
  [data-theme="console"] body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px); pointer-events:none; z-index:9999; }
  [data-theme="console"] body::after { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(0,255,65,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  .shell { display:grid; grid-template-columns:272px 1fr; min-height:100vh; position:relative; z-index:1; }
  aside { background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; transition:background var(--tr),border-color var(--tr); }
  .sidebar-top { padding:28px 22px 20px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .team-name { font-size:13px; font-weight:600; letter-spacing:.04em; color:var(--ink); display:flex; align-items:center; gap:8px; margin-bottom:2px; }
  .team-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .team-sub { font-size:11.5px; color:var(--ink-4); padding-left:16px; }
  [data-theme="console"] .team-name { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; }
  [data-theme="console"] .team-sub { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; }
  [data-theme="console"] .team-dot { animation:console-pulse 2s ease-in-out infinite; }
  @keyframes console-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,0.4)} 50%{box-shadow:0 0 0 5px rgba(0,255,65,0)} }

  .theme-toggle-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
  .theme-toggle { background:var(--line-2); border:1px solid var(--line); border-radius:var(--radius-sm); cursor:pointer; padding:4px 8px; color:var(--ink-3); font-size:9px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; transition:background var(--tr),color var(--tr),border-color var(--tr); white-space:nowrap; font-family:inherit; min-width:54px; text-align:center; }
  .theme-toggle:hover { background:var(--line); color:var(--ink); }
  [data-theme="console"] .theme-toggle { font-family:'Orbitron',monospace; border-color:var(--ink-4); color:var(--ink-3); background:rgba(0,20,0,0.8); letter-spacing:2px; }
  [data-theme="console"] .theme-toggle:hover { border-color:var(--accent); color:var(--accent); }

  .sidebar-section { padding:18px 22px 8px; }
  .sidebar-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-4); margin-bottom:6px; }
  .match-item { display:block; padding:10px 12px 10px 14px; border-radius:var(--radius-sm); cursor:pointer; transition:background var(--tr); border:none; border-left:3px solid transparent; background:none; width:100%; text-align:left; margin-bottom:2px; color:var(--ink); }
  .match-item:hover { background:var(--line-2); }
  .match-item.active { background:var(--active-item-bg); border-left-color:var(--accent); }
  .match-item.active .mi-opponent { color:var(--accent); }
  .match-item.status-upcoming { border-left-color:var(--upcoming); }
  .match-item.status-win { border-left-color:var(--win); }
  .match-item.status-loss { border-left-color:var(--loss); }
  .match-item.status-tie { border-left-color:#f59e0b; }
  .mi-date { font-size:10.5px; color:var(--ink-4); font-family:var(--mono); margin-bottom:2px; }
  .mi-opponent { font-size:13px; font-weight:500; color:var(--ink); transition:color var(--tr); }
  .mi-badge { display:inline-block; font-size:9.5px; font-weight:600; letter-spacing:.04em; padding:2px 7px; border-radius:20px; margin-top:4px; }
  .badge-upcoming { background:var(--upcoming-bg); color:var(--upcoming); }
  .badge-win { background:var(--win-bg); color:var(--win); }
  .badge-loss { background:var(--loss-bg); color:var(--loss); }
  [data-theme="console"] .match-item { font-family:'Share Tech Mono',monospace; border-radius:0; }
  [data-theme="console"] .match-item:hover { background:rgba(0,255,65,0.05); }
  [data-theme="console"] .match-item.active { background:rgba(0,255,65,0.08); border-left-color:var(--accent); box-shadow:inset 0 0 10px rgba(0,255,65,0.05); }
  [data-theme="console"] .mi-badge { border-radius:0; font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; }
  [data-theme="console"] .sidebar-label { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; }
  [data-theme="console"] .badge-upcoming { border:1px solid var(--upcoming); background:transparent; }
  [data-theme="console"] .badge-win { border:1px solid var(--win); background:transparent; }
  [data-theme="console"] .badge-loss { border:1px solid var(--loss); background:transparent; }

  main { padding:44px 52px 80px; max-width:1120px; position:relative; z-index:1; }
  [data-theme="console"] main { padding:28px 32px 80px; max-width:none; }
  [data-theme="console"] main::before { content:'◆ TORNKNÄCKARNA // SCOUTING WORKSTATION // CAPTAIN\'S MODE INTELLIGENCE // ESPARVEN DIVISION ◆'; display:block; background:var(--loss); color:#000; text-align:center; font-family:'Orbitron',monospace; font-weight:900; font-size:9px; letter-spacing:4px; padding:5px; margin-bottom:12px; animation:banner-pulse 3s ease-in-out infinite; }
  @keyframes banner-pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }

  .match-header { margin-bottom:40px; opacity:0; transform:translateY(12px); animation:fadeUp .38s cubic-bezier(0.4,0,0.2,1) .04s forwards; }
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  .match-title { font-size:30px; font-weight:300; letter-spacing:-.02em; color:var(--ink); line-height:1.2; margin-bottom:8px; }
  .match-title strong { font-weight:600; }
  .match-meta { font-size:13px; color:var(--ink-3); display:flex; gap:20px; margin-bottom:10px; }
  .notice { font-size:11px; padding:7px 12px; border-radius:6px; display:inline-block; margin-top:4px; }
  .notice-live { background:var(--upcoming-bg); color:var(--upcoming); }
  .notice-snapshot { background:var(--line-2); color:var(--ink-4); }
  [data-theme="console"] .match-title { font-family:'VT323',monospace; font-size:42px; font-weight:400; letter-spacing:2px; color:var(--accent); text-shadow:0 0 15px rgba(0,255,65,0.4); }
  [data-theme="console"] .match-title strong { font-weight:400; }
  [data-theme="console"] .match-meta { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px; color:var(--ink-3); }
  [data-theme="console"] .notice { border-radius:0; font-family:'Orbitron',monospace; font-size:9px; letter-spacing:2px; border:1px solid; }
  [data-theme="console"] .notice-live { border-color:var(--upcoming); background:transparent; }
  [data-theme="console"] .notice-snapshot { border-color:var(--ink-4); background:transparent; }

  /* ── Season toggle ── */
  .season-toggle-wrap { display:inline-flex; align-items:center; margin-top:14px; border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; background:var(--line-2); }
  .season-toggle-btn { background:none; border:none; cursor:pointer; font-family:inherit; font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--ink-4); padding:5px 14px; transition:background var(--tr),color var(--tr); white-space:nowrap; }
  .season-toggle-btn:hover { color:var(--ink-2); }
  .season-toggle-btn.active { background:var(--accent); color:#fff; }
  .season-divider { width:1px; background:var(--line); align-self:stretch; }
  [data-theme="light"] .season-toggle-btn.active { color:#fff; }
  [data-theme="console"] .season-toggle-wrap { border-radius:0; border-color:var(--ink-4); background:rgba(0,10,0,0.6); }
  [data-theme="console"] .season-toggle-btn { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--ink-4); }
  [data-theme="console"] .season-toggle-btn.active { background:var(--accent); color:#000; }

  .section-title { font-size:10.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-4); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--line); }
  .page-section { padding:28px 32px; border-radius:14px; margin-bottom:28px; }
  .page-section-bans { background:var(--section-bans-bg); border:1px solid var(--section-bans-bdr); }
  .page-section-roster { background:var(--section-roster-bg); border:1px solid var(--section-roster-bdr); }
  .page-section-history { background:var(--section-hist-bg); border:1px solid var(--section-hist-bdr); }
  [data-theme="console"] .page-section { border-radius:0; position:relative; }
  [data-theme="console"] .page-section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  [data-theme="console"] .section-title { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--ink-3); }
  [data-theme="console"] .page-section:hover { box-shadow:0 0 20px rgba(0,255,65,0.08); }

  .ban-section { margin-bottom:44px; }
  .ban-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
  .ban-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:flex-start; gap:10px; transition:box-shadow var(--tr),transform var(--tr); opacity:0; animation:fadeUp .35s cubic-bezier(0.4,0,0.2,1) forwards; }
  .ban-card:nth-child(1){animation-delay:.06s}.ban-card:nth-child(2){animation-delay:.10s}.ban-card:nth-child(3){animation-delay:.14s}
  .ban-card:nth-child(4){animation-delay:.18s}.ban-card:nth-child(5){animation-delay:.22s}.ban-card:nth-child(6){animation-delay:.26s}
  .ban-card:hover { box-shadow:var(--shadow-h); transform:translateY(-2px); }
  .ban-priority-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:6px; }
  .priority-high .ban-priority-dot { background:var(--ban-high); }
  .priority-med .ban-priority-dot { background:var(--ban-med); }
  .priority-low .ban-priority-dot { background:#9ca3af; }
  .ban-hero-icon { width:32px; height:32px; border-radius:5px; flex-shrink:0; background:var(--line-2); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .ban-hero-icon img { width:100%; height:100%; object-fit:contain; }
  .ban-body { flex:1; min-width:0; }
  .ban-hero-name { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ban-owner { font-size:10.5px; color:var(--ink-3); margin-bottom:6px; }
  .ban-stats { display:flex; gap:4px; flex-wrap:wrap; }
  .ban-stat { font-size:10px; font-family:var(--mono); color:var(--ink-3); background:var(--line-2); padding:1px 5px; border-radius:3px; }
  .ban-reason { font-size:10px; color:var(--ink-4); margin-top:5px; line-height:1.45; }
  .ban-score-bar { height:3px; background:var(--line); border-radius:2px; margin-top:8px; overflow:hidden; }
  .ban-score-fill { height:100%; border-radius:2px; }
  .priority-high .ban-score-fill { background:var(--ban-high); }
  .priority-med .ban-score-fill { background:var(--ban-med); }
  .priority-low .ban-score-fill { background:#9ca3af; }
  [data-theme="console"] .ban-card { border-radius:0; font-family:'Share Tech Mono',monospace; }
  [data-theme="console"] .ban-card:hover { transform:none; box-shadow:0 0 10px rgba(0,255,65,0.15); }
  [data-theme="console"] .ban-hero-name { font-family:'Share Tech Mono',monospace; font-size:12px; font-weight:400; letter-spacing:1px; }
  [data-theme="console"] .ban-owner { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:1px; }
  [data-theme="console"] .ban-stat { border-radius:0; font-family:'Share Tech Mono',monospace; border:1px solid var(--line); background:transparent; }
  [data-theme="console"] .priority-high .ban-priority-dot { animation:pulse-red 0.5s ease-in-out infinite; }
  [data-theme="console"] .priority-med .ban-priority-dot { animation:pulse-amber 1s ease-in-out infinite; }
  @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(255,32,32,0.6)} 50%{box-shadow:0 0 0 4px rgba(255,32,32,0)} }
  @keyframes pulse-amber { 0%,100%{box-shadow:0 0 0 0 rgba(255,176,0,0.4)} 50%{box-shadow:0 0 0 4px rgba(255,176,0,0)} }

  .player-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; margin-bottom:48px; }
  .player-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px; transition:box-shadow var(--tr),transform var(--tr),border-color var(--tr); opacity:0; animation:fadeUp .35s cubic-bezier(0.4,0,0.2,1) forwards; }
  .player-card:nth-child(1){animation-delay:.10s}.player-card:nth-child(2){animation-delay:.15s}.player-card:nth-child(3){animation-delay:.20s}
  .player-card:nth-child(4){animation-delay:.25s}.player-card:nth-child(5){animation-delay:.30s}
  .player-card:hover { box-shadow:var(--shadow-h); transform:translateY(-2px); border-color:var(--ink-4); }
  .player-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .player-name { font-size:15px; font-weight:600; color:var(--ink); margin-bottom:5px; }
  .player-meta { display:flex; flex-direction:column; gap:5px; }
  .rank-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; padding:3px 8px 3px 3px; border-radius:5px; width:fit-content; }
  .rank-medal-img { width:22px; height:22px; flex-shrink:0; object-fit:contain; }
  .player-wr { text-align:right; flex-shrink:0; }
  .wr-number { font-size:22px; font-weight:300; color:var(--ink); letter-spacing:-.02em; line-height:1; }
  .wr-label { font-size:10px; color:var(--ink-4); margin-top:1px; }
  [data-theme="console"] .player-card { border-radius:0; font-family:'Share Tech Mono',monospace; }
  [data-theme="console"] .player-card:hover { transform:none; box-shadow:0 0 15px rgba(0,255,65,0.12); border-color:var(--accent); }
  [data-theme="console"] .player-name { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:2px; font-weight:700; }
  [data-theme="console"] .rank-badge { border-radius:0; font-family:'Share Tech Mono',monospace; font-size:10px; }
  [data-theme="console"] .wr-number { font-family:'VT323',monospace; font-size:32px; font-weight:400; letter-spacing:0; }
  [data-theme="console"] .wr-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; }

  .hero-section { margin-bottom:12px; }
  .hero-section-label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-4); margin-bottom:7px; }
  .hero-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--line-2); }
  .hero-row:last-child { border-bottom:none; }
  .hero-icon-wrap { width:24px; height:24px; flex-shrink:0; border-radius:4px; background:var(--line-2); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .hero-icon-wrap img { width:100%; height:100%; object-fit:contain; display:block; }
  .hero-name { font-size:12px; font-weight:500; color:var(--ink); flex:1; }
  .hero-games { font-size:10.5px; color:var(--ink-4); font-family:var(--mono); white-space:nowrap; }
  .hero-wr-bar { width:40px; height:3px; background:var(--line); border-radius:2px; overflow:hidden; flex-shrink:0; }
  .hero-wr-fill { height:100%; border-radius:2px; background:var(--accent); }
  .hero-wr-fill.high { background:var(--win); }
  .hero-wr-fill.low { background:var(--loss); }
  .hero-wr-pct { font-size:10px; font-family:var(--mono); color:var(--ink-3); width:28px; text-align:right; }
  .key-pick-dot { width:6px; height:6px; border-radius:50%; background:var(--ban-high); flex-shrink:0; }
  [data-theme="console"] .hero-section-label { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; }
  [data-theme="console"] .hero-name { font-family:'Share Tech Mono',monospace; font-size:11px; font-weight:400; }
  [data-theme="console"] .hero-games,[data-theme="console"] .hero-wr-pct { font-family:'Share Tech Mono',monospace; }
  [data-theme="console"] .hero-icon-wrap,[data-theme="console"] .hero-wr-bar,[data-theme="console"] .hero-wr-fill { border-radius:0; }

  .form-row { display:flex; align-items:center; gap:3px; margin-top:12px; padding-top:10px; border-top:1px solid var(--line-2); }
  .form-label { font-size:10px; color:var(--ink-4); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-right:4px; white-space:nowrap; }
  .form-pip { width:15px; height:15px; border-radius:3px; font-size:8px; font-weight:700; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; }
  .form-pip.w { background:var(--win); }

<script>
const GIST_USER       = 'Lundmarks';
const INDEX_GIST_ID   = 'bd51bdad423fb0050aef6f7adea11c4e';
const OUR_TEAM_GIST_ID= '6bb4217e29ad303db186fc70a5bac583';
const MEDALS_BASE     = 'medals/';

function gistUrl(gistId) {
  return `https://gist.githubusercontent.com/${GIST_USER}/${gistId}/raw/data.json`;
}

// ── Next match state (used by logo speed + countdown) ─────────────────────────
let _nextMatchDate = null; // Date object or null

function getLogoSpeed() {
  const BASE = 0.50, MAX = 2.2;
  if(!_nextMatchDate) return BASE;
  const msLeft = _nextMatchDate - Date.now();
  if(msLeft <= 0) return MAX;
  const days = msLeft / (1000 * 60 * 60 * 24);
  // ramps from BASE at 14+ days to MAX at 0 days
  const t = Math.max(0, Math.min(1, 1 - days / 14));
  return BASE + (MAX - BASE) * t;
}

// ── Season filter state ───────────────────────────────────────────────────────
// true  = current season only (default)
// false = all seasons
let currentSeasonOnly = true;

// Cache the loaded bin so the toggle can re-render without re-fetching
let _currentMatchData    = null;
let _currentMatchContext = null; // { meetingId, isSelf }

// ── Theme ─────────────────────────────────────────────────────────────────────
const THEMES = ['dark','light','console'];
const THEME_LABELS = {dark:'Dark',light:'Light',console:'Console'};
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-toggle');
  if(btn) btn.textContent=THEME_LABELS[t]||t;
  if(t==='console') setTimeout(startConsoleLogo,0);
  if(t==='dark'||t==='light') setTimeout(startCleanLogo,0);
}
function cycleTheme() {
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  const next=THEMES[(THEMES.indexOf(cur)+1)%THEMES.length];
  localStorage.setItem('theme',next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme')||'dark');

// ── Gist storage ─────────────────────────────────────────────────────────────
async function fetchGist(gistId) {
  const r = await fetch(gistUrl(gistId));
  if(!r.ok) throw new Error(`Gist fetch ${r.status} for ${gistId}`);
  return r.json();
}

// ── Profile links ─────────────────────────────────────────────────────────────
function profileLinks(accountId) {
  if(!accountId) return '';
  return `<div class="player-links">
    <a class="player-link" href="https://www.dotabuff.com/players/${accountId}" target="_blank">Dotabuff</a>
    <a class="player-link" href="https://www.opendota.com/players/${accountId}" target="_blank">OpenDota</a>
  </div>`;
}

// ── Rank badge ─────────────────────────────────────────────────────────────────
const RANK_THEME = {
  Herald:{lbg:'#f3f4f6',lc:'#374151',dbg:'#1c1f27',dc:'#9ca3af'},
  Guardian:{lbg:'#f0fdf4',lc:'#166534',dbg:'#0d2b1a',dc:'#4ade80'},
  Crusader:{lbg:'#fffbeb',lc:'#92400e',dbg:'#271a05',dc:'#fbbf24'},
  Archon:{lbg:'#fff7ed',lc:'#9a3412',dbg:'#2a1208',dc:'#fb923c'},
  Legend:{lbg:'#fff1f2',lc:'#9f1239',dbg:'#2a0a10',dc:'#fb7185'},
  Ancient:{lbg:'#f5f3ff',lc:'#6d28d9',dbg:'#1a1040',dc:'#a78bfa'},
  Divine:{lbg:'#fefce8',lc:'#854d0e',dbg:'#201a04',dc:'#fde047'},
  Immortal:{lbg:'#ecfeff',lc:'#0e7490',dbg:'#042028',dc:'#22d3ee'},
  Unknown:{lbg:'#f3f4f6',lc:'#6b7280',dbg:'#1c1f27',dc:'#6b7280'},
};
function rankBadgeHTML(rankMedal,rankLabel) {
  const medal=rankMedal||'Unknown';
  const cfg=RANK_THEME[medal]||RANK_THEME.Unknown;
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  const bg=isLight?cfg.lbg:cfg.dbg, color=isLight?cfg.lc:cfg.dc;
  const imgUrl=`${MEDALS_BASE}${medal.toLowerCase().replace(/\s+/g,'_')}.png`;
  return `<div class="rank-badge" style="background:${bg};color:${color}">
    <img class="rank-medal-img" src="${imgUrl}" alt="${medal}" onerror="this.style.display='none'">
    ${rankLabel||'Unknown'}
  </div>`;
}

// ── Hero icons ─────────────────────────────────────────────────────────────────
const HERO_SLUG = {
  'Anti-Mage':'antimage','Axe':'axe','Beastmaster':'beastmaster','Bristleback':'bristleback',
  'Centaur':'centaur','Centaur Warrunner':'centaur','Chen':'chen','Clockwerk':'rattletrap',
  'Crystal Maiden':'crystal_maiden','Dark Willow':'dark_willow','Death Prophet':'death_prophet',
  'Dragon Knight':'dragon_knight','Drow Ranger':'drow_ranger','Earth Spirit':'earth_spirit',
  'Earthshaker':'earthshaker','Ember Spirit':'ember_spirit','Enigma':'enigma','Huskar':'huskar',
  'Invoker':'invoker','Jakiro':'jakiro','Juggernaut':'juggernaut','Leshrac':'leshrac',
  'Lina':'lina','Lion':'lion','Lycan':'lycan','Magnus':'magnataur','Mars':'mars',
  'Medusa':'medusa','Muerta':'muerta','Naga Siren':'naga_siren',"Nature's Prophet":'furion',
  'Omniknight':'omniknight','Phantom Assassin':'phantom_assassin','Phantom Lancer':'phantom_lancer',
  'Phoenix':'phoenix','Pudge':'pudge','Puck':'puck','Queen of Pain':'queenofpain','Razor':'razor',
  'Rubick':'rubick','Shadow Demon':'shadow_demon','Shadow Fiend':'nevermore',
  'Shadow Shaman':'shadow_shaman','Slardar':'slardar','Snapfire':'snapfire','Spectre':'spectre',
  'Spirit Breaker':'spirit_breaker','Storm Spirit':'storm_spirit','Techies':'techies',
  'Templar Assassin':'templar_assassin','Timbersaw':'shredder','Tinker':'tinker',
  'Tidehunter':'tidehunter','Troll Warlord':'troll_warlord','Ursa':'ursa',
  'Vengeful Spirit':'vengefulspirit','Viper':'viper','Void Spirit':'void_spirit',
  'Warlock':'warlock','Weaver':'weaver','Winter Wyvern':'winter_wyvern',
  'Witch Doctor':'witch_doctor','Wraith King':'skeleton_king','Clinkz':'clinkz',
  'Disruptor':'disruptor','Gyrocopter':'gyrocopter','Skywrath Mage':'skywrath_mage',
  'Tiny':'tiny','Pugna':'pugna','Lich':'lich','Windranger':'windrunner','Sven':'sven',
  'Bounty Hunter':'bounty_hunter','Legion Commander':'legion_commander','Mirana':'mirana',
  'Hoodwink':'hoodwink','Bane':'bane','Dazzle':'dazzle','Abaddon':'abaddon',
  'Alchemist':'alchemist','Ancient Apparition':'ancient_apparition','Arc Warden':'arc_warden',
  'Batrider':'batrider','Bloodseeker':'bloodseeker','Brewmaster':'brewmaster',
  'Broodmother':'broodmother','Chaos Knight':'chaos_knight','Doom':'doom',
  'Elder Titan':'elder_titan','Faceless Void':'faceless_void','Grimstroke':'grimstroke',
  'Io':'wisp','Keeper of the Light':'keeper_of_the_light','Kunkka':'kunkka',
  'Lifestealer':'life_stealer','Lone Druid':'lone_druid','Marci':'marci','Meepo':'meepo',
  'Monkey King':'monkey_king','Morphling':'morphling','Night Stalker':'night_stalker',
  'Nyx Assassin':'nyx_assassin','Ogre Magi':'ogre_magi','Oracle':'oracle',
  'Outworld Destroyer':'obsidian_destroyer','Pangolier':'pangolier','Primal Beast':'primal_beast',
  'Ring Master':'ringmaster','Riki':'riki','Sand King':'sand_king','Silencer':'silencer',
  'Slark':'slark','Terrorblade':'terrorblade','Treant Protector':'treant','Tusk':'tusk',
  'Underlord':'underlord','Undying':'undying','Venomancer':'venomancer','Visage':'visage',
  'Zeus':'zuus','Necrophos':'necrolyte','Naga Siren':'naga_siren',
  'Dark Seer':'dark_seer','Witch Doctor':'witch_doctor','Underlord':'underlord',
  'Snapfire':'snapfire','Ringmaster':'ringmaster',
};
function heroIconUrl(name,directUrl) {
  if(directUrl) return directUrl.startsWith('http')?directUrl:`https://steamcdn-a.akamaihd.net${directUrl}`;
  const slug=HERO_SLUG[name];
  return slug?`https://steamcdn-a.akamaihd.net/apps/dota2/images/dota_react/heroes/icons/${slug}.png`:null;
}
function heroIconTag(name,wrapClass,directUrl) {
  const url=heroIconUrl(name,directUrl);
  return `<div class="${wrapClass}">${url?`<img src="${url}" alt="${name}" loading="lazy" onerror="this.parentElement.style.opacity='0.3'">`:''}</div>`;
}

// ── Season toggle ─────────────────────────────────────────────────────────────
// Resolves the appropriate games/wr pair for a tournament hero based on toggle.
// Falls back gracefully for old bins that only have tournamentGames/tournamentWR.
function resolveHeroStats(h) {
  if (currentSeasonOnly) {
    return {
      games: h.currentSeasonGames ?? h.tournamentGames,
      wr:    h.currentSeasonWR    ?? h.tournamentWR,
    };
  }
  return { games: h.tournamentGames, wr: h.tournamentWR };
}

function seasonToggleHTML() {
  const isConsole = document.documentElement.getAttribute('data-theme') === 'console';
  const csLabel   = isConsole ? 'CURRENT SEASON' : 'Current season';
  const allLabel  = isConsole ? 'ALL SEASONS'    : 'All seasons';
  return `<div class="season-toggle-wrap">
    <button class="season-toggle-btn${currentSeasonOnly?' active':''}" onclick="setSeasonFilter(true)">${csLabel}</button>
    <div class="season-divider"></div>
    <button class="season-toggle-btn${!currentSeasonOnly?' active':''}" onclick="setSeasonFilter(false)">${allLabel}</button>
  </div>`;
}

function setSeasonFilter(csOnly) {
  if (currentSeasonOnly === csOnly) return;
  currentSeasonOnly = csOnly;
  if (_currentMatchData && _currentMatchContext) {
    if (_currentMatchContext.isSelf) _renderOurTeamPanel(_currentMatchData);
    else _renderMatchPanel(_currentMatchData, _currentMatchContext.meetingId);
  }
}

// ── Ban scoring ───────────────────────────────────────────────────────────────
function keyPickScore(h) {
  const {games, wr} = resolveHeroStats(h);
  if (!games) return 0;
  const delta     = Math.max(0, wr - (h.pubWR || wr));
  const deltaMult = 1 + (delta / 40);
  const recency   = h.recentSeason ? 1.2 : 1.0;
  return (wr / 100) * Math.log(games + 1) * deltaMult * recency;
}
function priorityLabel(s) { return s>=2.4?'high':s>=1.6?'med':'low'; }
function banReason(h) {
  const {games, wr} = resolveHeroStats(h);
  const delta = Math.max(0, wr - (h.pubWR||wr));
  const parts = [];
  if (games>=4) parts.push(`${games} CM games`);
  if (wr>=65)   parts.push(`${wr}% CM wr`);
  if (delta>=15) parts.push(`+${delta}pp vs pub`);
  return parts.join(' · ') || 'Moderate threat';
}
function computeBans(players) {
  const cands=[];
  for (const p of players)
    for (const h of (p.tournamentHeroes||[])) {
      const score=keyPickScore(h);
      if(score) cands.push({hero:h,player:p.name,score,priority:priorityLabel(score)});
    }
  cands.sort((a,b)=>b.score-a.score);
  const seen=new Set();
  return cands.filter(c=>{if(seen.has(c.hero.name))return false;seen.add(c.hero.name);return true;}).slice(0,6);
}

// ── Render: ban section ───────────────────────────────────────────────────────
function renderBanSection(players) {
  const bans=computeBans(players);
  const isConsole=document.documentElement.getAttribute('data-theme')==='console';
  if(!bans.length) return '<div style="color:var(--ink-4);font-size:13px;margin-bottom:32px">No CM data yet — ban suggestions will appear after the opponent plays their first match.</div>';
  const maxScore=bans[0].score||1;
  const banCard=b=>{
    const norm=Math.min(100,(b.score/maxScore)*100).toFixed(0);
    const {games,wr}=resolveHeroStats(b.hero);
    return `<div class="ban-card priority-${b.priority}">
      <div class="ban-priority-dot"></div>
      ${heroIconTag(b.hero.name,'ban-hero-icon',b.hero.iconUrl)}
      <div class="ban-body">
        <div class="ban-hero-name">${b.hero.name}</div>
        <div class="ban-owner">${b.player}</div>
        <div class="ban-stats">
          <span class="ban-stat">${games} CM games</span>
          <span class="ban-stat">${wr}% CM wr</span>
          ${b.hero.pubWR?`<span class="ban-stat">${b.hero.pubWR}% pub wr`:''}
        </div>
        <div class="ban-reason">${banReason(b.hero)}</div>
        <div class="ban-score-bar"><div class="ban-score-fill" style="width:${norm}%"></div></div>
      </div>
    </div>`;
  };
  const tier=(label,color,items)=>!items.length?'':`
    <div style="margin-bottom:20px">

function wrClass(wr) { return wr>=60?'high':wr<45?'low':''; }

function renderHeroRows(heroes, isTournament, isSelf) {
  if (!heroes||!heroes.length) return '<div style="font-size:12px;color:var(--ink-4);padding:4px 0">No data</div>';
  if (isTournament) {
    heroes = [...heroes].sort((a,b) => {
      const sa = resolveHeroStats(a), sb = resolveHeroStats(b);
      return sb.games - sa.games || sb.wr - sa.wr;
    });
  }
  let anyVisible = false;
  const rows = heroes.map(h => {
    let wr, games;
    if (isTournament) {
      const s = resolveHeroStats(h);
      wr = s.wr; games = s.games;
      if (games === 0) return ''; // hero not played in this season
    } else {
      wr = h.wr; games = h.games;
    }
    anyVisible = true;
    const isKey = !isSelf && isTournament && keyPickScore(h)>=2.4 && games>=3;
    return `<div class="hero-row">
      ${heroIconTag(h.name,'hero-icon-wrap',h.iconUrl)}
      <div class="hero-name">${h.name}</div>
      <div class="hero-games">${games}g</div>
      <div class="hero-wr-bar"><div class="hero-wr-fill ${wrClass(wr)}" style="width:${wr}%"></div></div>
      <div class="hero-wr-pct">${wr}%</div>
      ${isKey?'<div class="key-pick-dot" title="Ban candidate"></div>':'<div style="width:6px"></div>'}
    </div>`;
  }).join('');
  return anyVisible ? rows : '<div style="font-size:12px;color:var(--ink-4);padding:4px 0">No games this season</div>';
}

// ── Render: history table ─────────────────────────────────────────────────────
function renderHistory(history, currentSeasonId) {
  if (!history||!history.length) return '';
  const isConsole=document.documentElement.getAttribute('data-theme')==='console';

  // Filter by season. Old bins without seasonId are always shown.
  const filtered = history.filter(m => {
    if (!currentSeasonOnly) return true;
    if (m.seasonId == null) return true;
    return m.seasonId === currentSeasonId;
  });

  const seasonLabel = currentSeasonOnly ? ' this season' : '';
  const title = `${isConsole?'// ':''}Opponent's E-Sparven match history${seasonLabel}`;

  if (!filtered.length) return `
    <div class="page-section page-section-history history-section">
      <div class="section-title">${title}</div>
      <div style="font-size:13px;color:var(--ink-4)">No games recorded${seasonLabel}.</div>
    </div>`;

  const chipGroup=(picks,team)=>{
    const chips=(picks||[]).filter(pk=>pk.team===team).map(pk=>{
      const url=heroIconUrl(pk.heroName,pk.iconUrl);
      return `<span class="hero-chip"><div class="hero-chip-icon">${url?`<img src="${url}" alt="${pk.heroName}" loading="lazy">`:''}</div>${pk.heroName}</span>`;
    }).join('');
    return chips||'<span style="font-size:11px;color:var(--ink-4)">—</span>';
  };

  const rows=filtered.map(m=>{
    const oppTeam=m.opponentTeam??null, oppWon=m.opponentWon??null;
    const resultBadge=oppWon===true?`<span class="result-badge win">W</span>`:oppWon===false?`<span class="result-badge loss">L</span>`:'';
    const sideLabel=t=>oppTeam===null?'':t===oppTeam
      ?`<span style="font-size:9px;font-weight:700;letter-spacing:.05em;color:var(--upcoming);background:var(--upcoming-bg);padding:1px 5px;border-radius:${isConsole?'0':'3px'};margin-right:4px${isConsole?';font-family:Orbitron,monospace;letter-spacing:2px':''}">OPP</span>`
      :`<span style="font-size:9px;color:var(--ink-4);background:var(--line-2);padding:1px 5px;border-radius:${isConsole?'0':'3px'};margin-right:4px">vs</span>`;
    return `<tr>
      <td class="mono">${m.duration||'—'}</td>
      <td>${resultBadge?`<span style="margin-right:6px">${resultBadge}</span>`:''}${sideLabel(0)}${chipGroup(m.picks,0)}</td>
      <td>${sideLabel(1)}${chipGroup(m.picks,1)}</td>
      <td class="mono" style="color:var(--ink-4)">${m.patch?`patch ${m.patch}`:''}</td>
      <td style="white-space:nowrap"><a class="player-link" href="https://www.opendota.com/matches/${m.matchId}" target="_blank" style="font-size:10.5px;padding:2px 8px">Match</a></td>
    </tr>`;
  }).join('');

  return `<div class="page-section page-section-history history-section">
    <div class="section-title">${title}</div>
    <table class="history-table">
      <thead><tr><th>Duration</th><th>Radiant</th><th>Dire</th><th>Patch</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

}

const TICKER_ITEMS=[
  'PATCH 7.37 // DARK WILLOW REWORKED','TORNKNÄCKARNA // CAPTAIN\'S MODE',
  'E-SPARVEN DIVISION // CURRENT SEASON','ENIGMA BLACK HOLE // HIGH BAN PRIORITY',
  'INVOKER // WINRATE ELEVATED IN CM','REMEMBER: DRAFT TEMPO WINS GAMES',
  'ROSHAN SPAWNS AT 00:00 // TRACK IT','OBSERVER WARDS // PLACE EARLY',
  'SMOKE ROTATIONS // SECURE OBJECTIVES','NET WORTH DELTA // KEY METRIC',
  'CM DRAFT PHASE // 5 BANS EACH SIDE','ANALYSIS: PUSH LINEUPS STRONG PATCH',
];
function buildTicker(matches, tickerSnippets) {
  const parts = tickerSnippets && tickerSnippets.length
    ? [...tickerSnippets]
    : [...TICKER_ITEMS];

  // Always prepend next match and recent results from live index data
  const upcoming = matches.filter(m=>m.status==='upcoming');
  const past     = matches.filter(m=>m.status!=='upcoming');
  if(upcoming.length) parts.unshift(`NEXT MATCH ${upcoming[0].opponent.toUpperCase()} ${fmtDate(upcoming[0].date).toUpperCase()}`);
  const lastWin  = past.find(m=>m.status==='win');
  const lastLoss = past.find(m=>m.status==='loss');
  if(lastWin)  parts.unshift(`LAST WIN ${lastWin.opponent.toUpperCase()}`);
  if(lastLoss) parts.unshift(`LAST LOSS ${lastLoss.opponent.toUpperCase()}`);

  const full = [...parts,...parts].join('   ///   ');
  const el = document.getElementById('sidebar-ticker-text');
  if(el) el.textContent = full;
}

  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(DISP_W, DISP_H);
  const buf = imgData.data;

  const DEPTH = 0.22;
  const LD = (()=>{const v=[0.6,-0.5,0.6];const l=Math.sqrt(v[0]**2+v[1]**2+v[2]**2);return v.map(x=>x/l);})();

  function getThemeColors() {
    const theme = document.documentElement.getAttribute('data-theme');
    if(theme === 'light') {
      return { fg: [120,20,40], fgDim: [180,80,100], bg: [0,0,0,0] };
    }
    // dark theme — wine red
    return { fg: [160,30,55], fgDim: [100,20,35], bg: [0,0,0,0] };
  }

  function render(ay, ax) {
    const {fg, fgDim} = getThemeColors();
    const Cy=Math.cos(ay),Sy=Math.sin(ay),Cx=Math.cos(ax),Sx=Math.sin(ax);
    function w2m(wx,wy,wz){const rx1=wx*Cy-wz*Sy,ry1=wy,rz1=wx*Sy+wz*Cy;return[rx1,ry1*Cx+rz1*Sx,-ry1*Sx+rz1*Cx];}
    const[ddx,ddy,ddz]=w2m(0,0,1);
    const HZ=DEPTH*0.5;
    buf.fill(0);
    for(let py=0;py<DISP_H;py++){
      const sy_ndc=-((py/(DISP_H-1))*2-1);
      for(let px2=0;px2<DISP_W;px2++){
        const sx=(px2/(DISP_W-1))*2-1;
        const[ox,oy,oz]=w2m(sx,sy_ndc,-3.0);
        if(Math.abs(ddz)<1e-7)continue;
        const t_front=(HZ-oz)/ddz,t_back=(-HZ-oz)/ddz;
        const t_near=Math.min(t_front,t_back),t_far=Math.max(t_front,t_back);
        let hitColor=null;
        for(const tf of[t_near,t_far]){
          if(hitColor)break;
          const mx=ox+tf*ddx,my=oy+tf*ddy;
          const u=(mx+1)*0.5,v=1-(my/ASPECT+1)*0.5;
          if(u<0||u>=1||v<0||v>=1)continue;
          if(!sampleMask(u,v))continue;
          const nz_m=(tf===t_near)?Math.sign(ddz):-Math.sign(ddz);
          const nwx=nz_m*Cx*Sy,nwy=-nz_m*Sx,nwz=nz_m*Cx*Cy;
          const diff=Math.max(0,nwx*LD[0]+nwy*LD[1]+nwz*LD[2]);
          const b=Math.min(1,0.25+diff*0.75)*(tf===t_near?1.0:0.35);
          const c = tf===t_near?fg:fgDim;
          hitColor=[Math.round(c[0]*b),Math.round(c[1]*b),Math.round(c[2]*b),255];
        }
        if(!hitColor){
          const WSTEPS=8;
          for(let s=0;s<=WSTEPS&&!hitColor;s++){
            const tf=t_near+(t_far-t_near)*(s/WSTEPS);
            const mx=ox+tf*ddx,my=oy+tf*ddy;
            const u=(mx+1)*0.5,v=1-(my/ASPECT+1)*0.5;
            if(u<0||u>=1||v<0||v>=1)continue;
            if(!sampleMask(u,v))continue;
            const eps2=1.5/ART_W;
            const gx=sampleMask(u-eps2,v)-sampleMask(u+eps2,v);
            const gy=sampleMask(u,v-eps2*(ART_W/ART_H)*1.85)-sampleMask(u,v+eps2*(ART_W/ART_H)*1.85);
            const gl=Math.sqrt(gx*gx+gy*gy)||1;
            const nm_x=gx/gl,nm_y=gy/gl;
            const nwx=nm_x*Cy,nwz2=nm_y*Sx+(-nm_x*Sy)*Cx,nwy=nm_y*Cx-(-nm_x*Sy)*Sx;
            const diff=Math.max(0,nwx*LD[0]+nwy*LD[1]+nwz2*LD[2]);
            const b=Math.min(1,0.08+diff*0.55)*(1-(s/WSTEPS)*0.4)*0.7;
            hitColor=[Math.round(fgDim[0]*b),Math.round(fgDim[1]*b),Math.round(fgDim[2]*b),Math.round(b*255*3)];
          }
        }
        if(hitColor){
          const i=(py*DISP_W+px2)*4;
          buf[i]=hitColor[0];buf[i+1]=hitColor[1];buf[i+2]=hitColor[2];buf[i+3]=hitColor[3]??255;
        }
      }
    }
    ctx.clearRect(0,0,DISP_W,DISP_H);
    ctx.putImageData(imgData,0,0);
  }

  // ── state ──────────────────────────────────────────────────────────────────
  let autoAngleY = 0;
  let dragAngleY = 0, dragAngleX = 0;
  let isDragging = false;
  let lastMX = 0, lastMY = 0;
  let dragVelY = 0, dragVelX = 0;

  // ── drag events ────────────────────────────────────────────────────────────
  canvas.style.cursor = 'grab';
  canvas.addEventListener('mousedown', e => {
    isDragging = true; lastMX = e.clientX; lastMY = e.clientY;
    dragVelY = 0; dragVelX = 0; canvas.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if(!isDragging) return;
    dragVelY = -(e.clientX - lastMX) * 0.012;
    dragVelX = -(e.clientY - lastMY) * 0.012;
    dragAngleY += dragVelY; dragAngleX += dragVelX;
    dragAngleX = Math.max(-0.8, Math.min(0.8, dragAngleX));
    lastMX = e.clientX; lastMY = e.clientY;
  });
  window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'grab'; });
  canvas.addEventListener('touchstart', e => {
    isDragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    dragVelY = 0; dragVelX = 0; e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    if(!isDragging) return;
    dragVelY = -(e.touches[0].clientX - lastMX) * 0.012;
    dragVelX = -(e.touches[0].clientY - lastMY) * 0.012;
    dragAngleY += dragVelY; dragAngleX += dragVelX;
    dragAngleX = Math.max(-0.8, Math.min(0.8, dragAngleX));
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () => { isDragging = false; });

  // ── tick ───────────────────────────────────────────────────────────────────
  let lastTs = null;
  function tick(ts) {
    const dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.05) : 0.016;
    lastTs = ts;
    const speed = getLogoSpeed();
    if(!isDragging) {
      dragAngleY += dragVelY; dragAngleX += dragVelX;
      dragVelY *= 0.88; dragVelX *= 0.88;
      dragAngleX *= 0.96;
      autoAngleY += speed * dt;
    }
    render(autoAngleY + dragAngleY, dragAngleX);
    requestAnimationFrame(tick);
  }

  // redefine render to accept explicit ay, ax
  requestAnimationFrame(tick);
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function startCountdown(nextMatch) {
  const wrap     = document.getElementById('countdown-wrap');
  const timeEl   = document.getElementById('countdown-time');
  const oppEl    = document.getElementById('countdown-opponent');
  if(!wrap || !timeEl) return;

  if(!nextMatch || !nextMatch.date) {
    wrap.style.display = 'none';
    return;
  }

  const matchDate = new Date(nextMatch.date);
  if(isNaN(matchDate)) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';
  if(oppEl) oppEl.textContent = `vs ${nextMatch.opponent}`;

  function pad(n){ return String(n).padStart(2,'0'); }
  function tick() {
    const diff = matchDate - Date.now();
    if(diff <= 0) {
      timeEl.textContent = 'Match day';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    timeEl.textContent = d > 0
      ? `${d}d ${pad(h)}h ${pad(m)}m`
      : `${pad(h)}:${pad(m)}:${pad(s)}`;
    setTimeout(tick, 1000);
  }
  tick();
}

function buildSidebar(matches, tickerSnippets) {
  buildTicker(matches, tickerSnippets);

  // Set next match date for logo speed + countdown
  const nextMatch = matches.find(m => m.status === 'upcoming');
  _nextMatchDate = nextMatch && nextMatch.date ? new Date(nextMatch.date) : null;
  startCountdown(nextMatch);
  const upcoming=matches.filter(m=>m.status==='upcoming');
  const past=matches.filter(m=>m.status!=='upcoming').reverse();
  const item=m=>{
    const bc={upcoming:'badge-upcoming',win:'badge-win',loss:'badge-loss',tie:'badge-loss'}[m.status]||'badge-upcoming';
    const bt={upcoming:'Upcoming',win:'Win',loss:'Loss',tie:'Tie'}[m.status]||m.status;
    return `<button class="match-item status-${m.status}" data-bin="${m.gistId}" onclick="loadMatch('${m.gistId}','${m.meetingId||''}',this)">
      <div class="mi-date">${fmtDate(m.date)}</div>
      <div class="mi-opponent">${m.opponent}</div>
      <span class="mi-badge ${bc}">${bt}</span>
    </button>`;
  };
  let html=`<div class="sidebar-section">
    <div class="sidebar-label">Our team</div>
    <button class="match-item" id="our-team-btn" onclick="loadOurTeam(this)">
      <div class="mi-opponent">Tornknäckarna</div>
      <span class="mi-badge badge-upcoming" style="background:var(--line-2);color:var(--ink-3)">Roster</span>
    </button>
  </div>`;
  if(upcoming.length) html+=`<div class="sidebar-section"><div class="sidebar-label">Upcoming</div>${upcoming.map(item).join('')}</div>`;
  if(past.length) html+=`<div class="sidebar-section"><div class="sidebar-label">Past matches</div>${past.map(item).join('')}</div>`;
  if(!upcoming.length&&!past.length) html+='<div style="padding:0 22px 20px;font-size:13px;color:var(--ink-4)">No matches found.</div>';
  document.getElementById('sidebar-content').innerHTML=html;
}

    ?`<div class="notice notice-live">Live data · refreshed daily until match day</div>`
    :`<div class="notice notice-snapshot">Snapshot · ${fmtDate(data.snapshotAt)}</div>`;
  const esparvenUrl=meetingId?`https://esparven.se/none/Meeting/Details/${meetingId}`:null;
  const isConsole=document.documentElement.getAttribute('data-theme')==='console';
  const currentSeasonId=data.currentSeasonId??null;
  document.getElementById('main-panel').innerHTML=`
    <div class="match-header">
      <div style="margin-bottom:10px"><span class="mi-badge ${badgeClass}" style="font-size:11px">${badgeText}</span></div>
      <div class="match-title">vs <strong>${data.opponent}</strong>${consoleCursor()}</div>
      <div class="match-meta">
        <span>${fmtDate(data.date)}</span>
        <span>Dota 2 · Captain's Mode</span>
        ${esparvenUrl?`<a href="${esparvenUrl}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:13px">E-Sparven</a>`:''}
      </div>
      ${notice}
      ${seasonToggleHTML()}
    </div>
    ${status==='upcoming'?`<div class="page-section page-section-bans">${renderBanSection(data.players||[])}${renderDraftTendencies(data.draftTendencies)}</div>`:`<div class="page-section page-section-bans">${renderDraftTendencies(data.draftTendencies)}</div>`}
    <div class="page-section page-section-roster">
      <div class="section-title" style="margin-bottom:16px">${isConsole?'// ':''}Opponent roster</div>
      <div class="player-grid">${(data.players||[]).map(p=>renderPlayerCard(p,false)).join('')}</div>
    </div>
    ${renderHistory(data.history,currentSeasonId)}`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async()=>{
  let index;
  try{index=await fetchGist(INDEX_GIST_ID);}
  catch(e){document.getElementById('sidebar-content').innerHTML=`<div style="padding:20px 22px;color:var(--loss);font-size:13px">Failed to load index: ${e.message}</div>`;return;}
  const matches=index.matches||[];
  const tickerSnippets=index.tickerSnippets||[];
  buildSidebar(matches, tickerSnippets);
  const first = matches.find(m=>m.status==='upcoming') || [...matches].reverse().find(m=>m.status!=='upcoming');
  if(first) loadMatch(first.gistId, first.meetingId||'', document.querySelector(`[data-bin="${first.gistId}"]`));
})();
</script>
</body>
</html>
